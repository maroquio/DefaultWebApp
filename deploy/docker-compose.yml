# ⚠️ NOME DO PROJETO COMPOSE — OBRIGATÓRIO trocar por fork (ver docs/FORKING.md §2b).
# Sem este `name:`, o Compose deriva o nome do projeto da PASTA do arquivo (`deploy/`),
# então TODO fork vira o mesmo projeto "deploy" no host. Consequência: cada deploy roda
# `docker compose down --remove-orphans` e DERRUBA os containers dos outros forks
# (502 Bad Gateway nos demais). O `name` precisa ser ÚNICO por projeto no VPS.
name: dwa

# Execute a partir do diretório deploy/ (ou aponte -f deploy/docker-compose.yml).
# O contexto de build é a RAIZ do repositório, pois o Dockerfile multi-stage
# precisa de frontend/ (build do SPA) e backend/ (API FastAPI).
services:
  web:
    container_name: dwa.ifes.site
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    ports:
      - "8410:8000"
    restart: unless-stopped
    environment:
      # Banco SQLite dentro do volume persistente (ver volume dwa_data abaixo).
      DATABASE_PATH: /app/data/dados.db
    # Persiste o banco SQLite e os uploads entre recriações do container.
    volumes:
      - dwa_data:/app/data
      - dwa_uploads:/app/static/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  # `name:` fixa o nome FÍSICO do volume no host (sem o prefixo do projeto).
  # Ao trocar o `name:` do projeto (topo) por fork, troque também estes para
  # `<slug>_data`/`<slug>_uploads` — assim os dados não dependem do project name.
  dwa_data:
    name: dwa_data
  dwa_uploads:
    name: dwa_uploads
